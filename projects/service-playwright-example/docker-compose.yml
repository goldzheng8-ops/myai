version: "3.9"

services:
  service-playwright-example:
    build:
      context: .
      dockerfile: Dockerfile
    image: service-playwright-example:latest
    container_name: service-playwright-example
    ports:
      - "8002:8002"
    restart: unless-stopped
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/service
    command: ["uv", "run", "uvicorn", "app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8002"]
    # command: ["sleep", "infinity"]

    networks:

      - ai-network

networks:

  ai-network:

    external: true
